<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical Quiz Master • IPM II: Brick Question Review (80 Qs)</title>
    <style>
        :root {
            --bg-color: #131314;
            --card-bg: #1e1f20;
            --card-hover: #262729;
            --option-bg: #282a2c;
            --option-hover: #313335;
            --text-main: #e3e3e3;
            --text-muted: #9aa0a6;
            --accent-blue: #a8c7fa;
            --button-text: #062e6f;
            --success-green: #6dd58c;
            --error-red: #e46962;
            --flag-yellow: #fbc02d; 
            --font-family: -apple-system, BlinkMacSystemFont, "Google Sans", "Segoe UI", Roboto, sans-serif;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: var(--font-family); 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
            -webkit-font-smoothing: antialiased; 
        }

        #app-wrapper {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            transform-origin: top center; transition: transform 0.1s ease;
        }
        
        .view-section { display: none; flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .view-section.active { display: block; }

        .menu-header { max-width: 900px; margin: 20px auto; border-bottom: 1px solid #333; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .menu-title { font-size: 2rem; font-weight: 600; color: var(--accent-blue); margin: 0; }
        
        .week-section { max-width: 900px; margin: 30px auto; }
        .week-header { font-size: 1.2rem; font-weight: 700; color: var(--text-muted); margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}

        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        
        .quiz-card {
            background-color: var(--card-bg); border-radius: 16px; padding: 24px; border: 1px solid #333; 
            display: flex; flex-direction: column; gap: 15px; transition: transform 0.2s;
        }
        .quiz-card:hover { transform: translateY(-2px); border-color: #555; background-color: var(--card-hover); }

        .quiz-layout { max-width: 800px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        .progress-section { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-top: 10px; }
        .progress-bars { display: flex; flex: 1; gap: 4px; height: 6px; }
        .bar-segment { flex: 1; background-color: #444746; border-radius: 2px; transition: background 0.3s; }
        .bar-segment.active { background-color: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .bar-segment.correct { background-color: var(--success-green); }
        .bar-segment.wrong { background-color: var(--error-red); }
        
        .score-display { display: flex; align-items: center; gap: 12px; font-weight: 500; font-size: 0.9rem; }
        .pill { padding: 6px 14px; border-radius: 100px; display: flex; align-items: center; gap: 8px; }
        .pill.red { background-color: rgba(228, 105, 98, 0.15); color: var(--error-red); }
        .pill.green { background-color: rgba(109, 213, 140, 0.15); color: var(--success-green); }

        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .zoom-controls { display: flex; gap: 10px; align-items: center; }
        .zoom-btn { background: #222; border: 1px solid #444; color: #ccc; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        
        .flag-btn {
            background: transparent; border: 1px solid #555; color: #888; 
            padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; display: flex; gap: 6px; align-items: center;
        }
        .flag-btn.active { background: var(--flag-yellow); color: #000; border-color: var(--flag-yellow); font-weight: bold; }

        .session-tag {
            display: inline-block; font-size: 0.75rem; font-weight: 700; color: var(--accent-blue);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
            background: rgba(168, 199, 250, 0.1); padding: 4px 8px; border-radius: 4px;
        }
        
        .critical-indicator {
            display: inline-block; color: var(--flag-yellow); margin-left: 10px; text-shadow: 0 0 10px rgba(251, 192, 45, 0.5);
            font-size: 1.2rem; animation: pulse 2s infinite; display: none;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .question-text { font-size: 1.35rem; line-height: 1.6; margin-bottom: 32px; color: #ececec; }
        
        .option-item {
            background: var(--option-bg); padding: 18px 24px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; 
            display: flex; align-items: center; gap: 16px; border: 2px solid transparent; transition: all 0.2s; font-size: 1.05rem;
            position: relative; overflow: hidden;
        }
        .option-item:hover:not(.disabled) { background: var(--option-hover); }
        .option-item.disabled { cursor: default; }
        .option-item.correct { border-color: var(--success-green); background: rgba(109, 213, 140, 0.1); }
        .option-item.wrong { border-color: var(--error-red); background: rgba(228, 105, 98, 0.1); }
        
        .status-badge { margin-left: auto; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 4px 8px; border-radius: 6px; }
        .status-badge.b-green { color: var(--success-green); background: rgba(0,0,0,0.3); }
        .status-badge.b-red { color: var(--error-red); background: rgba(0,0,0,0.3); }

        .rationale-box { margin-top: 32px; padding-top: 24px; border-top: 1px solid #444; display: none; }
        .rationale-line { padding: 12px 16px; margin-bottom: 10px; border-radius: 12px; font-size: 0.95rem; line-height: 1.6; background: rgba(255,255,255,0.03); border-left: 4px solid #444; }
        .rationale-line.is-correct-answer { background: rgba(109, 213, 140, 0.1); border-left-color: var(--success-green); color: #e8f5e9; }
        .rationale-line.is-wrong-answer { background: rgba(228, 105, 98, 0.08); border-left-color: var(--error-red); color: #ffcdd2; opacity: 0.9; }

        .nav-footer { margin-top: auto; padding-top: 24px; display: flex; justify-content: space-between; align-items: center; }

        .btn { padding: 10px 16px; border-radius: 100px; border: none; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn-primary { background: var(--accent-blue); color: var(--button-text); padding: 12px 24px; }
        .btn-sec { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .btn-danger { background: rgba(228, 105, 98, 0.2); color: var(--error-red); border-radius: 8px; }
        .btn-review { color: #ffca7a; background: rgba(230, 150, 0, 0.15); width: 100%; border-radius: 8px; margin-bottom: 5px; }
        .btn-flag-rev { color: #000; background: var(--flag-yellow); width: 100%; border-radius: 8px; opacity: 0.8; }
        
        .grid-overlay {
            position: fixed; top: 0; right: 0; width: 320px; height: 100%; background: #222; 
            border-left: 1px solid #444; z-index: 500; padding: 20px; overflow-y: auto;
            transform: translateX(100%); transition: transform 0.3s;
        }
        .grid-overlay.open { transform: translateX(0); }
        .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        
        .q-cell {
            aspect-ratio: 1; background: #333; border-radius: 6px; display: flex; justify-content: center; 
            align-items: center; font-size: 0.8rem; cursor: pointer; color: #888; position: relative; overflow: hidden;
            border: 1px solid transparent;
        }
        .q-cell.current { border: 2px solid #fff; }
        .q-cell.correct { background: rgba(109, 213, 140, 0.2); color: var(--success-green); }
        .q-cell.wrong { background: rgba(228, 105, 98, 0.2); color: var(--error-red); }
        .q-cell.flagged { background: var(--flag-yellow); color: #000; font-weight: bold; }
        .q-cell.split-green { background: linear-gradient(45deg, var(--flag-yellow) 50%, rgba(109, 213, 140, 0.5) 50%); color: #fff; }
        .q-cell.split-red { background: linear-gradient(45deg, var(--flag-yellow) 50%, rgba(228, 105, 98, 0.5) 50%); color: #fff; }
        .q-cell.critical::after { content: '★'; position: absolute; top: 0px; right: 2px; font-size: 10px; color: #fff; text-shadow: 0 0 2px #000; }

        .option-item.crossed-out {
            opacity: 0.4;
            text-decoration: line-through;
            background-color: #151515;
        }
        .cross-btn {
            padding: 8px 12px;
            margin-left: 10px;
            border-radius: 50%;
            border: 1px solid #444;
            color: #666;
            background: transparent;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            z-index: 10;
        }
        .cross-btn:hover { background: #333; color: #fff; border-color: #777; }
        .cross-btn.active { color: var(--error-red); border-color: var(--error-red); background: rgba(228, 105, 98, 0.1); }

        .highlight-span { background-color: #fbc02d; color: #000; padding: 2px 0; border-radius: 2px; }
        body.highlight-mode { cursor: text; }
        body.highlight-mode .option-item { cursor: text; }
        .btn.highlight-active { background-color: #fbc02d; color: #000; border-color: #fbc02d; box-shadow: 0 0 10px rgba(251, 192, 45, 0.4); }

    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="view-menu" class="view-section active">
        <div class="menu-header">
            <div>
                <h1 class="menu-title">IPM II - Brick Review Quiz (80 Qs)</h1>
                <div style="color:var(--text-muted); margin-top:5px;">80 of Dr. Nix's Tricky Review Questions.</div>
            </div>
            <div class="zoom-controls">
                <span style="font-size:0.8rem; color:#888;">Zoom:</span>
                <button class="zoom-btn" onclick="adjustZoom(-0.1)">-</button>
                <button class="zoom-btn" onclick="adjustZoom(0.1)">+</button>
            </div>
        </div>
        <div id="quiz-menu-container"></div>
    </div>

    <div id="view-quiz" class="view-section">
        <div class="quiz-layout">
            <div class="progress-section">
                <div class="progress-bars" id="bar-container"></div>
                <div class="score-display">
                    <span id="counter-text" style="color:#888; margin-right:8px;">1 / 80</span>
                    <div class="pill red">✕ <span id="count-wrong">0</span></div>
                    <div class="pill green">✔ <span id="count-correct">0</span></div>
                </div>
            </div>

            <div class="control-row">
                <button class="btn btn-sec" onclick="goHome()">❮ Menu</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-sec" id="btn-highlight" onclick="toggleHighlightMode()">✎</button>
                    <button class="flag-btn" id="btn-flag" onclick="toggleFlag()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg> Flag
                    </button>
                    <button class="btn btn-sec" onclick="toggleGrid()">Map ▦</button>
                </div>
            </div>

            <div style="flex:1; overflow-y:auto; padding-right:10px;" id="q-scroll-area">
                <div id="review-banner" style="background:#422; color:#fba; padding:12px; border-radius:8px; margin-bottom:20px; display:none; text-align:center;"></div>
                <div class="question-text">
                    <span id="q-content"></span>
                    <span id="critical-star" class="critical-indicator">★</span>
                </div>
                <div id="q-options"></div>
                <div id="q-rationale" class="rationale-box">
                    <div style="color:var(--accent-blue); font-weight:600; margin-bottom:15px; display:flex; gap:8px; align-items:center;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5z"/></svg> Explanation
                    </div>
                    <div id="q-rationale-text"></div>
                </div>
            </div>

            <div class="nav-footer">
                <button class="btn btn-sec" id="btn-prev" onclick="nav(-1)">Previous</button>
                <button class="btn btn-primary" id="btn-next" onclick="nav(1)">Next Question</button>
            </div>
        </div>
    </div>
</div>

<div id="grid-sidebar" class="grid-overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; color:#fff; font-weight:bold;">
        <span>Question Map • IPM II (80)</span>
        <button class="btn btn-sec" style="padding:4px 8px;" onclick="toggleGrid()">✕</button>
    </div>
    <div id="grid-cells" class="q-grid"></div>
</div>

<script>
    let DB = { quizzes: [] };
    let STATE = { activeId: null, currentQ: 0, mode: 'normal', reviewIndices: [], highlightMode: false };
    let currentZoom = 1;

    function initApp() {
        const saved = localStorage.getItem('QuizMaster_v9');
        if (saved) DB = JSON.parse(saved);

        if(typeof PASTE_AREA_1 !== 'undefined' && PASTE_AREA_1.length > 0) {
            injectQuiz("IPM II: Brick Question Review Quiz • 80 Qs", PASTE_AREA_1, "ipm_ii_final");
        }

        renderMenu();
    }

    function injectQuiz(title, data, id) {
        let safeData = (Array.isArray(data[0])) ? data[0] : data; 
        if (!DB.quizzes.find(q => q.id === id)) {
            const cleanQs = safeData.map(q => ({
                question: q.question,
                options: q.options,
                correctIndex: q.correctIndex,
                explanations: q.explanations || ["Rationale not available."]
            }));
            DB.quizzes.push({
                id: id, title: title, questions: cleanQs,
                history: new Array(cleanQs.length).fill(null).map(() => ({ s: null, f: false }))
            });
            saveDB();
        }
    }

    function saveDB() { localStorage.setItem('QuizMaster_v9', JSON.stringify(DB)); }

    function renderMenu() {
        const container = document.getElementById('quiz-menu-container');
        container.innerHTML = '';
        if(DB.quizzes.length === 0) return;

        const section = document.createElement('div');
        section.className = 'week-section';
        const header = document.createElement('div');
        header.className = 'week-header';
        header.innerText = "IPM II FINAL PREP";
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'quiz-grid';
        DB.quizzes.forEach(q => grid.appendChild(createQuizCard(q)));
        section.appendChild(grid);
        container.appendChild(section);
    }

    function createQuizCard(q) {
        const total = q.questions.length;
        const answered = q.history.filter(h => h.s !== null).length;
        const flagged = q.history.filter(h => h.f === true).length;
        let correct = 0;
        q.history.forEach((h, i) => { if(h.s !== null && h.s === q.questions[i].correctIndex) correct++; });
        const pct = Math.round((answered/total)*100);
        const wrong = answered - correct;

        const card = document.createElement('div');
        card.className = 'quiz-card';
        let btnHtml = `<button class="btn btn-primary" style="flex:1" onclick="startQuiz('${q.id}')">${answered > 0 ? 'Resume' : 'Start 80-Q Review'}</button>`;
        let revMissedBtn = wrong > 0 ? `<button class="btn btn-review" onclick="startReview('${q.id}', 'missed')">Review ${wrong} Missed</button>` : '';
        let revFlaggedBtn = flagged > 0 ? `<button class="btn btn-flag-rev" onclick="startReview('${q.id}', 'flagged')">Review ${flagged} Flagged</button>` : '';

        card.innerHTML = `
            <div><div style="font-size:1.2rem; font-weight:600; color:#fff">${q.title}</div>
            <div style="font-size:0.9rem; color:#aaa">${total} Questions • Brick Review Questions </div></div>
            <div style="background:#333; height:6px; border-radius:3px; overflow:hidden;">
                <div style="width:${pct}%; background:var(--accent-blue); height:100%;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#aaa;">
                <span>${pct}% Complete</span> <span>${correct} Correct</span>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                ${btnHtml}
                <button class="btn btn-danger" onclick="resetQuiz('${q.id}')">Reset</button>
            </div>
            ${revMissedBtn}
            ${revFlaggedBtn}
        `;
        return card;
    }

    function startQuiz(id) { STATE.activeId = id; STATE.mode = 'normal';
        const qObj = DB.quizzes.find(q => q.id === id);
        let idx = qObj.history.findIndex(h => h.s === null);
        STATE.currentQ = (idx === -1) ? 0 : idx;
        enterQuiz();
    }

    function startReview(id, mode) {
        STATE.activeId = id; STATE.mode = mode; 
        const qObj = DB.quizzes.find(q => q.id === id);
        if (mode === 'missed') {
            STATE.reviewIndices = qObj.history.map((h, i) => (h.s !== null && h.s !== qObj.questions[i].correctIndex) ? i : -1).filter(i => i !== -1);
        } else {
            STATE.reviewIndices = qObj.history.map((h, i) => (h.f === true) ? i : -1).filter(i => i !== -1);
        }
        STATE.currentQ = 0;
        enterQuiz();
    }

    function enterQuiz() {
        document.getElementById('view-menu').classList.remove('active');
        document.getElementById('view-quiz').classList.add('active');
        const banner = document.getElementById('review-banner');
        if (STATE.mode === 'normal') banner.style.display = 'none';
        else {
            banner.style.display = 'block';
            banner.innerText = STATE.mode === 'missed' ? "REVIEW MODE: Retrying Missed Questions" : "REVIEW MODE: Checking Flagged Questions";
        }
        renderQuestion();
    }

    function getActiveData() {
        const qObj = DB.quizzes.find(q => q.id === STATE.activeId);
        const realIndex = STATE.mode === 'normal' ? STATE.currentQ : STATE.reviewIndices[STATE.currentQ];
        return {
            qObj, question: qObj.questions[realIndex], realIndex, 
            historyItem: qObj.history[realIndex], total: STATE.mode === 'normal' ? qObj.questions.length : STATE.reviewIndices.length
        };
    }

    function renderQuestion() {
        const data = getActiveData();
        const sel = data.historyItem.s; 
        const isFlag = data.historyItem.f; 

        const barContainer = document.getElementById('bar-container');
        barContainer.innerHTML = '';
        let cCount = 0, wCount = 0;
        data.qObj.history.forEach((h, i) => {
            if(h.s !== null) { if(h.s === data.qObj.questions[i].correctIndex) cCount++; else wCount++; }
        });

        if (STATE.mode === 'normal') {
            data.qObj.history.forEach((h, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar-segment';
                if (i === STATE.currentQ) bar.classList.add('active');
                if (h.s !== null) {
                    if (h.s === data.qObj.questions[i].correctIndex) bar.classList.add('correct');
                    else bar.classList.add('wrong');
                }
                barContainer.appendChild(bar);
            });
        }

        document.getElementById('counter-text').innerText = `${STATE.currentQ + 1} / ${data.total}`;
        document.getElementById('count-correct').innerText = cCount;
        document.getElementById('count-wrong').innerText = wCount;

        const flagBtn = document.getElementById('btn-flag');
        if (isFlag) flagBtn.classList.add('active'); else flagBtn.classList.remove('active');

        document.getElementById('q-content').innerHTML = `${STATE.currentQ + 1}. ${data.question.question}`;
        
        const star = document.getElementById('critical-star');
        const isWrong = (sel !== null && sel !== data.question.correctIndex);
        star.style.display = (isFlag && isWrong) ? 'inline-block' : 'none';

        const optDiv = document.getElementById('q-options'); optDiv.innerHTML = '';
        data.question.options.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-item';
            if(sel !== null) {
                btn.classList.add('disabled');
                if (i === data.question.correctIndex) {
                    btn.classList.add('correct');
                    btn.innerHTML = `<div style="font-weight:bold; color:#777;">${String.fromCharCode(65+i)}.</div><div style="flex:1">${opt}</div><div class="status-badge b-green">✔ Correct</div>`;
                } else if (i === sel) {
                    btn.classList.add('wrong');
                    btn.innerHTML = `<div style="font-weight:bold; color:#777;">${String.fromCharCode(65+i)}.</div><div style="flex:1">${opt}</div><div class="status-badge b-red">✕ Incorrect</div>`;
                } else {
                    btn.innerHTML = `<div style="font-weight:bold; color:#777;">${String.fromCharCode(65+i)}.</div><div style="flex:1">${opt}</div>`;
                }
            } else {
                btn.innerHTML = `
                    <div style="font-weight:bold; color:#777;">${String.fromCharCode(65+i)}.</div>
                    <div style="flex:1">${opt}</div>
                    <div class="cross-btn" onclick="event.stopPropagation(); toggleCrossOut(this)">✕</div>
                `;
                btn.onclick = () => handleAnswer(i);
            }
            optDiv.appendChild(btn);
        });

        const ratBox = document.getElementById('q-rationale');
        const ratText = document.getElementById('q-rationale-text');
        if(sel !== null) {
            ratBox.style.display = 'block';
            ratText.innerHTML = '';
            data.question.explanations.forEach(exp => {
                const div = document.createElement('div');
                div.className = 'rationale-line';
                if(exp.toLowerCase().includes('correct')) div.classList.add('is-correct-answer');
                else if(exp.toLowerCase().includes('incorrect')) div.classList.add('is-wrong-answer');
                div.innerHTML = exp.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                ratText.appendChild(div);
            });
            setTimeout(() => document.getElementById('q-scroll-area').scrollTo({top: 5000, behavior:'smooth'}), 100);
        } else { ratBox.style.display = 'none'; }

        document.getElementById('btn-prev').disabled = STATE.currentQ === 0;
        document.getElementById('btn-next').innerText = STATE.currentQ === data.total - 1 ? 'Finish' : 'Next';
        updateGrid();
    }

    function handleAnswer(idx) {
        const data = getActiveData();
        if(STATE.mode === 'normal') {
            data.qObj.history[data.realIndex].s = idx; 
            saveDB();
        }
        renderQuestion();
    }

    function toggleFlag() {
        const data = getActiveData();
        data.qObj.history[data.realIndex].f = !data.qObj.history[data.realIndex].f;
        saveDB(); renderQuestion(); 
    }

    function nav(dir) {
        const data = getActiveData();
        const next = STATE.currentQ + dir;
        if(next >= 0 && next < data.total) { 
            STATE.currentQ = next; 
            renderQuestion(); 
            document.getElementById('q-scroll-area').scrollTop = 0; 
        }
        else if (next >= data.total) goHome();
    }

    function resetQuiz(id) {
        if(confirm("Reset this quiz?")) {
            const qObj = DB.quizzes.find(q => q.id === id);
            qObj.history = qObj.history.map(() => ({ s: null, f: false }));
            saveDB(); renderMenu();
        }
    }

    function goHome() {
        document.getElementById('view-menu').classList.add('active');
        document.getElementById('view-quiz').classList.remove('active');
        renderMenu();
    }

    function adjustZoom(amount) {
        currentZoom += amount;
        if(currentZoom < 0.5) currentZoom = 0.5;
        if(currentZoom > 2.0) currentZoom = 2.0;
        document.getElementById('app-wrapper').style.transform = `scale(${currentZoom})`;
    }

    function toggleGrid() { document.getElementById('grid-sidebar').classList.toggle('open'); }
    
    function updateGrid() {
        const container = document.getElementById('grid-cells'); container.innerHTML = '';
        const data = getActiveData();
        for(let i=0; i<data.total; i++) {
            const realIdx = STATE.mode === 'normal' ? i : STATE.reviewIndices[i];
            const h = data.qObj.history[realIdx]; 
            const correctIdx = data.qObj.questions[realIdx].correctIndex;
            const cell = document.createElement('div'); cell.className = 'q-cell'; cell.innerText = i+1;
            if (h.s === null) {
                if (h.f) cell.classList.add('flagged'); 
            } else {
                const isCorrect = (h.s === correctIdx);
                if (h.f) {
                    if (isCorrect) cell.classList.add('split-green');
                    else { cell.classList.add('split-red'); cell.classList.add('critical'); }
                } else {
                    if (isCorrect) cell.classList.add('correct'); else cell.classList.add('wrong');
                }
            }
            if(i === STATE.currentQ) cell.classList.add('current');
            cell.onclick = () => { STATE.currentQ = i; renderQuestion(); toggleGrid(); };
            container.appendChild(cell);
        }
    }

    function toggleHighlightMode() {
        STATE.highlightMode = !STATE.highlightMode;
        const btn = document.getElementById('btn-highlight');
        if (STATE.highlightMode) {
            btn.classList.add('highlight-active');
            document.body.classList.add('highlight-mode');
        } else {
            btn.classList.remove('highlight-active');
            document.body.classList.remove('highlight-mode');
        }
    }

    function toggleCrossOut(btnElement) {
        const optionDiv = btnElement.closest('.option-item');
        if (optionDiv.classList.contains('crossed-out')) {
            optionDiv.classList.remove('crossed-out');
            btnElement.classList.remove('active');
        } else {
            optionDiv.classList.add('crossed-out');
            btnElement.classList.add('active');
        }
    }

    document.addEventListener('mouseup', function() {
        if (!STATE.highlightMode) return;
        const selection = window.getSelection();
        if (!selection.toString().trim()) return;
        const range = selection.getRangeAt(0);
        const container = document.getElementById('q-scroll-area');
        if (container && container.contains(range.commonAncestorContainer)) {
            try {
                const span = document.createElement('span');
                span.className = 'highlight-span';
                span.dataset.new = "true"; 
                setTimeout(() => span.removeAttribute('data-new'), 300);
                range.surroundContents(span);
                selection.removeAllRanges();
            } catch (e) {}
        }
    });

    document.addEventListener('click', function(e) {
        if (!STATE.highlightMode) return;
        if (e.target.classList.contains('highlight-span')) {
            if (e.target.dataset.new) return;
            const text = document.createTextNode(e.target.textContent);
            e.target.parentNode.replaceChild(text, e.target);
        }
    });

    const originalHandleAnswer = handleAnswer;
    handleAnswer = function(idx) {
        if (STATE.highlightMode) return;
        const options = document.getElementById('q-options').children;
        if (options[idx] && options[idx].classList.contains('crossed-out')) return;
        originalHandleAnswer(idx);
    }
